<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PK E-Commerce — Full Database Design</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --border: #252a38;
    --border2: #2f3548;
    --text: #e2e5f0;
    --muted: #6b7491;
    --dim: #3d4461;

    --users:   #4f8ef7;
    --catalog: #2ecfa0;
    --orders:  #f0a04b;
    --seo:     #d672e8;
    --analytics: #f05a7e;
    --marketing: #f7c948;
    --support:   #5bcefa;

    --users-bg:     rgba(79,142,247,.10);
    --catalog-bg:   rgba(46,207,160,.10);
    --orders-bg:    rgba(240,160,75,.10);
    --seo-bg:       rgba(214,114,232,.10);
    --analytics-bg: rgba(240,90,126,.10);
    --marketing-bg: rgba(247,201,72,.10);
    --support-bg:   rgba(91,206,250,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .title-block h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .title-block p {
    margin-top: 4px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    padding: 20px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,15,20,0.96);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }
  .search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    opacity: .4;
  }
  input[type=search] {
    width: 100%;
    padding: 9px 12px 9px 34px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
  }
  input[type=search]:focus { border-color: var(--dim); }
  input[type=search]::placeholder { color: var(--muted); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all .15s;
    background: var(--bg3);
    color: var(--muted);
    border-color: var(--border2);
  }
  .pill:hover { color: var(--text); border-color: var(--dim); }
  .pill.active { color: #fff; }
  .pill[data-domain="all"].active     { background: var(--bg3); border-color: var(--text); color: #fff; }
  .pill[data-domain="users"].active   { background: var(--users-bg); border-color: var(--users); color: var(--users); }
  .pill[data-domain="catalog"].active { background: var(--catalog-bg); border-color: var(--catalog); color: var(--catalog); }
  .pill[data-domain="orders"].active  { background: var(--orders-bg); border-color: var(--orders); color: var(--orders); }
  .pill[data-domain="seo"].active     { background: var(--seo-bg); border-color: var(--seo); color: var(--seo); }
  .pill[data-domain="analytics"].active { background: var(--analytics-bg); border-color: var(--analytics); color: var(--analytics); }
  .pill[data-domain="marketing"].active { background: var(--marketing-bg); border-color: var(--marketing); color: var(--marketing); }
  .pill[data-domain="support"].active   { background: var(--support-bg);   border-color: var(--support);   color: var(--support); }

  .expand-all {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    background: none;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    transition: color .15s;
  }
  .expand-all:hover { color: var(--text); }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  /* ── Table Card ── */
  .table-card {
    background: var(--bg);
    transition: background .15s;
  }
  .table-card.hidden { display: none; }
  .table-card:hover { background: var(--bg2); }

  .card-header {
    padding: 18px 20px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    user-select: none;
  }
  .domain-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .card-header-text { flex: 1; min-width: 0; }
  .table-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    letter-spacing: .3px;
  }
  .table-meta {
    margin-top: 4px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .domain-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .col-count {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .chevron {
    color: var(--dim);
    transition: transform .2s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .table-card.open .chevron { transform: rotate(90deg); }

  /* ── Columns ── */
  .columns {
    display: none;
    border-top: 1px solid var(--border);
  }
  .table-card.open .columns { display: block; }

  .col-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 7px 20px 7px 40px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .col-row:last-child { border-bottom: none; }
  .col-row:hover { background: var(--bg3); }
  .col-row.highlight { background: rgba(255,220,50,.04); }

  .col-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .col-name.pk-col { color: #f0c040; }
  .col-name.fk-col { color: #7ab8f5; }

  .col-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }

  .badges { display: flex; gap: 4px; justify-content: flex-end; }
  .badge {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .badge-pk { background: rgba(240,192,64,.15); color: #f0c040; }
  .badge-fk { background: rgba(122,184,245,.12); color: #7ab8f5; }
  .badge-uk { background: rgba(46,207,160,.12); color: #2ecfa0; }
  .badge-nn { background: rgba(107,116,145,.12); color: var(--muted); }

  .col-note {
    grid-column: 1 / -1;
    font-size: 10.5px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    padding-bottom: 2px;
    padding-left: 0;
  }

  /* domain colors on dot & badge */
  [data-domain="users"]     .domain-dot { background: var(--users); }
  [data-domain="catalog"]   .domain-dot { background: var(--catalog); }
  [data-domain="orders"]    .domain-dot { background: var(--orders); }
  [data-domain="seo"]       .domain-dot { background: var(--seo); }
  [data-domain="analytics"] .domain-dot { background: var(--analytics); }
  [data-domain="marketing"] .domain-dot { background: var(--marketing); }
  [data-domain="support"]   .domain-dot { background: var(--support); }

  [data-domain="users"]     .domain-badge { background: var(--users-bg); color: var(--users); }
  [data-domain="catalog"]   .domain-badge { background: var(--catalog-bg); color: var(--catalog); }
  [data-domain="orders"]    .domain-badge { background: var(--orders-bg); color: var(--orders); }
  [data-domain="seo"]       .domain-badge { background: var(--seo-bg); color: var(--seo); }
  [data-domain="analytics"] .domain-badge { background: var(--analytics-bg); color: var(--analytics); }
  [data-domain="marketing"] .domain-badge { background: var(--marketing-bg); color: var(--marketing); }
  [data-domain="support"]   .domain-badge { background: var(--support-bg); color: var(--support); }

  /* empty state */
  #empty {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    background: var(--bg);
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>PK E-Commerce — Database Design</h1>
    <p>PostgreSQL · Cash on Delivery · Pakistan-specific · v1.0</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">46</div><div class="stat-label">tables</div></div>
    <div class="stat"><div class="stat-num">7</div><div class="stat-label">domains</div></div>
    <div class="stat"><div class="stat-num" id="col-count-stat">263</div><div class="stat-label">columns</div></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="5" stroke="white" stroke-width="1.5"/>
      <path d="M10.5 10.5L14 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="search" id="search" placeholder="Search tables or columns…">
  </div>
  <div class="filters">
    <div class="pill active" data-domain="all">All</div>
    <div class="pill" data-domain="users">Users</div>
    <div class="pill" data-domain="catalog">Catalog</div>
    <div class="pill" data-domain="orders">Orders</div>
    <div class="pill" data-domain="seo">SEO</div>
    <div class="pill" data-domain="analytics">Analytics</div>
    <div class="pill" data-domain="marketing">Marketing</div>
    <div class="pill" data-domain="support">Support & Ops</div>
  </div>
  <button class="expand-all" id="expand-all-btn">expand all</button>
</div>

<div class="grid" id="grid"></div>
<div id="empty">no tables match your search</div>

<script>
const TABLES = [
  // ── USERS ──────────────────────────────────────────────────────
  { name: 'neon_auth.users_sync', domain: 'users', note: 'Managed by Neon Auth — do not write directly', cols: [
    { name: 'id',          type: 'text',        tags: ['PK'],  note: 'Neon Auth user ID (external)' },
    { name: 'name',        type: 'text',        tags: [] },
    { name: 'email',       type: 'text',        tags: [] },
    { name: 'created_at',  type: 'timestamptz', tags: [] },

    { name: 'user_id',       type: 'uuid',         tags: ['FK'],  note: 'Nullable — guest addresses have no user' },
    { name: 'full_name',     type: 'varchar(120)', tags: [] },
    { name: 'phone_pk',      type: 'varchar(20)',  tags: [] },
    { name: 'address_line1', type: 'text',         tags: [] },
    { name: 'address_line2', type: 'text',         tags: [] },
    { name: 'city',          type: 'varchar(80)',  tags: [] },
    { name: 'province',      type: 'varchar(30)',  tags: [],  note: 'Punjab / Sindh / KPK / Balochistan / ICT / GB / AJK' },
    { name: 'postal_code',   type: 'varchar(10)',  tags: [] },
    { name: 'is_default',    type: 'boolean',      tags: [] },
    { name: 'is_guest',      type: 'boolean',      tags: [],  note: 'True for guest checkout addresses' },

  { name: 'admin_users', domain: 'users', note: 'Internal staff — auth via Neon Auth, role managed here', cols: [
    { name: 'id',           type: 'uuid',         tags: ['PK'] },

    { name: 'last_login_at',type: 'timestamptz',  tags: [] },
    { name: 'created_at',   type: 'timestamptz',  tags: [] },

  // ── CATALOG ────────────────────────────────────────────────────
  { name: 'categories', domain: 'catalog', note: 'Nested category tree', cols: [
    { name: 'id',          type: 'uuid',         tags: ['PK'] },
    { name: 'parent_id',   type: 'uuid',         tags: ['FK'],  note: 'Self-reference for subcategories' },
    { name: 'name_en',     type: 'varchar(120)', tags: [] },
    { name: 'name_ur',     type: 'varchar(120)', tags: [],      note: 'Urdu label' },

  { name: 'product_variants', domain: 'catalog', note: 'Size, color, SKU combinations', cols: [

    { name: 'sku',             type: 'varchar(80)',   tags: ['UK'] },
    { name: 'color',           type: 'varchar(60)',   tags: [] },

  { name: 'order_status_history', domain: 'orders', note: 'Full audit trail of status changes', cols: [

const DOMAIN_LABELS = { users:'Users & Auth', catalog:'Catalog', orders:'Orders & COD', seo:'SEO', analytics:'Analytics', marketing:'Marketing', support:'Support & Ops' };

function buildCard(tbl) {
  const card = document.createElement('div');
  card.className = 'table-card';
  card.dataset.domain = tbl.domain;
  card.dataset.name = tbl.name.toLowerCase();
  card.dataset.cols = tbl.cols.map(c=>c.name).join(' ');

  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `
    <div class="domain-dot"></div>
    <div class="card-header-text">
      <div class="table-name">${tbl.name}</div>
      <div class="table-meta">
        <span class="domain-badge">${DOMAIN_LABELS[tbl.domain]}</span>
        <span class="col-count">${tbl.cols.length} cols · ${tbl.note}</span>
      </div>
    </div>
    <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  const cols = document.createElement('div');
  cols.className = 'columns';

  tbl.cols.forEach(col => {
    const row = document.createElement('div');
    row.className = 'col-row';
    if (col.tags.includes('PK') || col.tags.includes('FK')) row.classList.add('highlight');
    const nameClass = col.tags.includes('PK') ? 'col-name pk-col' : col.tags.includes('FK') ? 'col-name fk-col' : 'col-name';
    const badgesHTML = col.tags.map(t => `<span class="badge badge-${t.toLowerCase()}">${t}</span>`).join('');
    row.innerHTML = `<div class="${nameClass}">${col.name}</div><div class="col-type">${col.type}</div><div class="badges">${badgesHTML}</div>`;
    if (col.note) {
      const noteRow = document.createElement('div');
      noteRow.className = 'col-row';
      noteRow.style.paddingTop = '0';
      noteRow.style.paddingBottom = '6px';
      noteRow.style.borderBottom = 'none';
      noteRow.innerHTML = `<div class="col-note">↳ ${col.note}</div>`;
      cols.appendChild(row);
      cols.appendChild(noteRow);
    } else {
      cols.appendChild(row);
    }
  });

  header.addEventListener('click', () => {
    card.classList.toggle('open');
  });

  card.appendChild(header);
  card.appendChild(cols);
  return card;
}

const grid = document.getElementById('grid');
TABLES.forEach(t => grid.appendChild(buildCard(t)));

// Filter & Search
let activeDomain = 'all';
let query = '';

function applyFilters() {
  let visible = 0;
  document.querySelectorAll('.table-card').forEach(card => {
    const domainMatch = activeDomain === 'all' || card.dataset.domain === activeDomain;
    const q = query.trim().toLowerCase();
    const searchMatch = !q || card.dataset.name.includes(q) || card.dataset.cols.includes(q);
    const show = domainMatch && searchMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';
}

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeDomain = pill.dataset.domain;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  applyFilters();
  if (query) {
    document.querySelectorAll('.table-card:not(.hidden)').forEach(c => c.classList.add('open'));
  }
});

let allOpen = false;
document.getElementById('expand-all-btn').addEventListener('click', () => {
  allOpen = !allOpen;
  document.querySelectorAll('.table-card:not(.hidden)').forEach(c => c.classList.toggle('open', allOpen));
  document.getElementById('expand-all-btn').textContent = allOpen ? 'collapse all' : 'expand all';
});
</script>
